[project]
name = "nanocode"
version = "0.1.0"
description = "A CLI coding assistant powered by LLM"
requires-python = ">=3.10"
dependencies = [
    "openai>=1.0.0",
    "pyyaml>=6.0",
    "python-telegram-bot>=20.0",
]

[project.scripts]
nanocode = "nanocode.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = []
