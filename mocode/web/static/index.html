<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoCode</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
  <aside id="sidebar">
    <div id="sidebar-header">
      <div id="brand">MoCode</div>
      <button id="new-chat-btn" title="New Chat">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
    <div id="session-list"></div>
  </aside>
  <div id="sidebar-toggle" title="Toggle sidebar">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </div>
  <main id="chat-panel">
    <div id="chat-header">
      <span id="chat-title">New Chat</span>
      <span id="model-info"></span>
      <span id="status"></span>
    </div>
    <div id="messages"></div>
    <div id="empty-state">
      <div id="empty-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
      </div>
      <p>Start a conversation</p>
    </div>
    <div id="input-bar">
      <div id="input-wrapper">
        <textarea id="input" rows="1" placeholder="Type a message..." autofocus></textarea>
        <button id="send-btn" title="Send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
        <button id="interrupt-btn" title="Interrupt">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
        </button>
      </div>
    </div>
  </main>
</div>

<script src="app.js"></script>
</body>
</html>
